---
services:
  redis:
    image: "${PUBLIC_REGISTRY_URL}/redis:6-alpine"
    env_file:
      - "settings.env"
      - "credentials.env"
    command:
      - "sh"
      - "-c" # this is to evaluate the $NAUTOBOT_REDIS_PASSWORD from the env
      - "redis-server --appendonly yes --requirepass $$NAUTOBOT_REDIS_PASSWORD"
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      test: "echo $$REDISCLI_AUTH | redis-cli --askpass ping | grep PONG"
