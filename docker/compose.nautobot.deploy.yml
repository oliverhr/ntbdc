---
x-nautobot-base: &nautobot-base
  image: "${NAUTOBOT_IMAGE_NAME}"
  tty: true
  env_file:
    - "settings.env"
    - "credentials.env"

x-celery-base: &celery-base
  <<: *nautobot-base
  depends_on:
    nautobot:
      condition: "service_healthy"

configs:
  nautobot-config:
    file: "../nautobot/${NAUTOBOT_CONFIG_FILE}"

services:
  nautobot:
    <<: *nautobot-base
    command: "nautobot-server runserver 0.0.0.0:8080"
    ports:
      - "8080:8080"
    volumes: &vols
      - "../nautobot/jobs:/opt/nautobot/jobs"
    configs: &configs
      - source: "nautobot-config"
        target: "/opt/nautobot/nautobot_config.py"
    healthcheck:
      start_period: 3m
      interval: 1m
      timeout: 30s
      retries: 5
      test: "nautobot-server health_check"
    depends_on:
      - "db"
      - "redis"

  celery_beat:
    <<: *celery-base
    healthcheck:
      start_period: 3m
      interval: 10s
      timeout: 5s
      retries: 5
      test: "test -n $$(find /tmp/nautbot_celery_beat_heartbeat -mmin -0.1 | wc -l) || false"
    entrypoint:
      - "sh"
      - "-c" # this is to evaluate the $NAUTOBOT_LOG_LEVEL from the env
      - "nautobot-server celery beat -l $$NAUTOBOT_LOG_LEVEL"

  celery_worker:
    <<: *celery-base
    volumes: *vols
    configs: *configs
    healthcheck:
      start_period: 3m
      interval: 30s
      timeout: 20s
      retries: 5
      test: "nautobot-server celery inspect ping --destination celery@$$HOSTNAME"
    entrypoint:
      - "sh"
      - "-c" # this is to evaluate the $NAUTOBOT_LOG_LEVEL from the env
      - "nautobot-server celery worker -l $$NAUTOBOT_LOG_LEVEL --events"
